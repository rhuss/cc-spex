schema_version: "1.0"
workflow:
  id: spex-setup
  name: Spex Setup
  version: "6.0.0-dev"
  description: >-
    Install spex extensions and configure agent harness.
    Single-command entry point for Claude Code, Codex, OpenCode, or any spec-kit harness.

inputs:
  integration:
    type: string
    default: "auto"
    prompt: "Agent harness (auto, claude, codex, opencode)"
  extensions:
    type: string
    default: "recommended"
    prompt: "Extensions to enable (recommended, all, interactive, or comma-separated list)"
  security:
    type: string
    default: "safe"
    prompt: "Security profile (Safe, Autonomous, or YOLO)"
  fallback_confirmation:
    type: string
    default: "decline"
    prompt: "Confirm a proposed safer security fallback (accept or decline)"

steps:
  - id: check-version
    type: shell
    run: |
      version_output=$(specify version 2>/dev/null) || {
        echo "ERROR: specify CLI not found. Install with:" >&2
        echo "  uv tool install specify-cli --force --from git+https://github.com/github/spec-kit.git" >&2
        exit 1
      }
      version=$(echo "$version_output" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
      [ -n "$version" ] || { echo "ERROR: Cannot parse specify version" >&2; exit 1; }
      major=$(echo "$version" | cut -d. -f1)
      minor=$(echo "$version" | cut -d. -f2)
      patch=$(echo "$version" | cut -d. -f3)
      if [ "$major" -gt 0 ] 2>/dev/null; then
        printf "%s" "$version"
        exit 0
      fi
      if [ "$major" -eq 0 ] && [ "$minor" -gt 12 ] 2>/dev/null; then
        printf "%s" "$version"
        exit 0
      fi
      if [ "$major" -eq 0 ] && [ "$minor" -eq 12 ] && [ "$patch" -ge 16 ] 2>/dev/null; then
        printf "%s" "$version"
        exit 0
      fi
      echo "ERROR: spec-kit $version too old (requires >= 0.12.16 for workflow_dir). Upgrade:" >&2
      echo "  uv tool install specify-cli --force --from git+https://github.com/github/spec-kit.git" >&2
      exit 1

  - id: validate-source
    type: shell
    run: |
      SOURCE="${SPEX_SOURCE:-$SPECKIT_WORKFLOW_DIR}"
      if [ -z "$SOURCE" ]; then
        echo "ERROR: Cannot determine spex source directory." >&2
        echo "Run from a file (specify workflow run spex/setup.yml)" >&2
        echo "or set SPEX_SOURCE." >&2
        exit 1
      fi
      if [ ! -d "$SOURCE/extensions/spex" ]; then
        echo "ERROR: Spex extensions not found at $SOURCE/extensions/spex" >&2
        exit 1
      fi
      printf "%s" "$SOURCE"

  - id: detect-agent
    type: shell
    run: |
      INPUT="{{ inputs.integration }}"
      case "$INPUT" in
        auto) ;;
        claude|codex|opencode) printf "%s" "$INPUT"; exit 0 ;;
        *) echo "ERROR: Unknown integration '$INPUT'. Use: auto, claude, codex, opencode" >&2; exit 1 ;;
      esac
      DETECT_SCRIPT="${SPEX_SOURCE:-$SPECKIT_WORKFLOW_DIR}/scripts/hooks/shared/detect-agent.sh"
      if [ -f "$DETECT_SCRIPT" ]; then
        AGENT=$(sh "$DETECT_SCRIPT" "$(pwd)")
        printf "%s" "${AGENT:-claude}"
      else
        printf "%s" "claude"
      fi

  - id: validate-security
    type: shell
    run: |
      SECURITY="{{ inputs.security }}"
      PROFILE=".specify/spex-profile.yml"
      # Keeping the default on refresh preserves the user's prior request.
      if [ "$SECURITY" = "safe" ] && [ -f "$PROFILE" ]; then
        SAVED_SECURITY=$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1])).get("requested_security", ""))' "$PROFILE" 2>/dev/null || true)
        [ -z "$SAVED_SECURITY" ] || SECURITY="$SAVED_SECURITY"
      fi
      case "$SECURITY" in
        safe|autonomous|yolo) printf "%s" "$SECURITY" ;;
        *)
          echo "ERROR: Unknown security profile '$SECURITY'. Use: safe, autonomous, yolo" >&2
          exit 1
          ;;
      esac

  - id: migrate-commands
    type: shell
    run: |
      found=false
      for f in .claude/commands/speckit.*.md; do
        [ -f "$f" ] || continue
        found=true
        break
      done
      if [ "$found" = true ]; then
        for f in .claude/commands/speckit.*.md; do
          [ -f "$f" ] || continue
          rm "$f"
        done
        echo "Migrated old commands to skills format" >&2
      fi
      printf "ok"

  - id: init-project
    type: shell
    run: |
      AGENT="{{ steps.detect-agent.output.stdout }}"
      specify init --here --integration "$AGENT" --script sh --force

  - id: install-ext-spex
    type: shell
    run: |
      SOURCE="${SPEX_SOURCE:-$SPECKIT_WORKFLOW_DIR}"
      EXT="spex"
      EXT_PATH="$SOURCE/extensions/$EXT"
      [ -f "$EXT_PATH/extension.yml" ] || { echo "Extension $EXT not found at $EXT_PATH" >&2; exit 1; }
      if [ -d ".specify/extensions/$EXT" ]; then
        echo "y" | specify extension remove "$EXT" >/dev/null 2>&1 || true
      fi
      DEV_FLAG=""
      case "$SOURCE" in /tmp/*|"${TMPDIR:-/tmp}"/*) ;; *) DEV_FLAG="--dev" ;; esac
      specify extension add "$EXT_PATH" $DEV_FLAG

  - id: install-ext-spex-gates
    type: shell
    run: |
      SOURCE="${SPEX_SOURCE:-$SPECKIT_WORKFLOW_DIR}"
      EXT="spex-gates"
      EXT_PATH="$SOURCE/extensions/$EXT"
      [ -f "$EXT_PATH/extension.yml" ] || { echo "Extension $EXT not found at $EXT_PATH" >&2; exit 1; }
      if [ -d ".specify/extensions/$EXT" ]; then
        echo "y" | specify extension remove "$EXT" >/dev/null 2>&1 || true
      fi
      DEV_FLAG=""
      case "$SOURCE" in /tmp/*|"${TMPDIR:-/tmp}"/*) ;; *) DEV_FLAG="--dev" ;; esac
      specify extension add "$EXT_PATH" $DEV_FLAG

  - id: install-ext-spex-worktrees
    type: shell
    run: |
      SOURCE="${SPEX_SOURCE:-$SPECKIT_WORKFLOW_DIR}"
      EXT="spex-worktrees"
      EXT_PATH="$SOURCE/extensions/$EXT"
      [ -f "$EXT_PATH/extension.yml" ] || { echo "Extension $EXT not found at $EXT_PATH" >&2; exit 1; }
      if [ -d ".specify/extensions/$EXT" ]; then
        echo "y" | specify extension remove "$EXT" >/dev/null 2>&1 || true
      fi
      DEV_FLAG=""
      case "$SOURCE" in /tmp/*|"${TMPDIR:-/tmp}"/*) ;; *) DEV_FLAG="--dev" ;; esac
      specify extension add "$EXT_PATH" $DEV_FLAG

  - id: install-ext-spex-deep-review
    type: shell
    run: |
      SOURCE="${SPEX_SOURCE:-$SPECKIT_WORKFLOW_DIR}"
      EXT="spex-deep-review"
      EXT_PATH="$SOURCE/extensions/$EXT"
      [ -f "$EXT_PATH/extension.yml" ] || { echo "Extension $EXT not found at $EXT_PATH" >&2; exit 1; }
      if [ -d ".specify/extensions/$EXT" ]; then
        echo "y" | specify extension remove "$EXT" >/dev/null 2>&1 || true
      fi
      DEV_FLAG=""
      case "$SOURCE" in /tmp/*|"${TMPDIR:-/tmp}"/*) ;; *) DEV_FLAG="--dev" ;; esac
      specify extension add "$EXT_PATH" $DEV_FLAG

  - id: install-ext-spex-teams
    type: shell
    run: |
      SOURCE="${SPEX_SOURCE:-$SPECKIT_WORKFLOW_DIR}"
      EXT="spex-teams"
      EXT_PATH="$SOURCE/extensions/$EXT"
      [ -f "$EXT_PATH/extension.yml" ] || { echo "Extension $EXT not found at $EXT_PATH" >&2; exit 1; }
      if [ -d ".specify/extensions/$EXT" ]; then
        echo "y" | specify extension remove "$EXT" >/dev/null 2>&1 || true
      fi
      DEV_FLAG=""
      case "$SOURCE" in /tmp/*|"${TMPDIR:-/tmp}"/*) ;; *) DEV_FLAG="--dev" ;; esac
      specify extension add "$EXT_PATH" $DEV_FLAG

  - id: install-ext-spex-collab
    type: shell
    run: |
      SOURCE="${SPEX_SOURCE:-$SPECKIT_WORKFLOW_DIR}"
      EXT="spex-collab"
      EXT_PATH="$SOURCE/extensions/$EXT"
      [ -f "$EXT_PATH/extension.yml" ] || { echo "Extension $EXT not found at $EXT_PATH" >&2; exit 1; }
      if [ -d ".specify/extensions/$EXT" ]; then
        echo "y" | specify extension remove "$EXT" >/dev/null 2>&1 || true
      fi
      DEV_FLAG=""
      case "$SOURCE" in /tmp/*|"${TMPDIR:-/tmp}"/*) ;; *) DEV_FLAG="--dev" ;; esac
      specify extension add "$EXT_PATH" $DEV_FLAG

  - id: install-ext-spex-detach
    type: shell
    run: |
      SOURCE="${SPEX_SOURCE:-$SPECKIT_WORKFLOW_DIR}"
      EXT="spex-detach"
      EXT_PATH="$SOURCE/extensions/$EXT"
      [ -f "$EXT_PATH/extension.yml" ] || { echo "Extension $EXT not found at $EXT_PATH" >&2; exit 1; }
      if [ -d ".specify/extensions/$EXT" ]; then
        echo "y" | specify extension remove "$EXT" >/dev/null 2>&1 || true
      fi
      DEV_FLAG=""
      case "$SOURCE" in /tmp/*|"${TMPDIR:-/tmp}"/*) ;; *) DEV_FLAG="--dev" ;; esac
      specify extension add "$EXT_PATH" $DEV_FLAG

  - id: load-refresh-profile
    type: shell
    run: |
      # Refresh metadata is advisory until the profile persistence step writes
      # a new revision. Existing enabled_extensions and requested_security are
      # preserved whenever the user keeps the recommended/Safe defaults.
      PROFILE=".specify/spex-profile.yml"
      if [ ! -f "$PROFILE" ] || ! command -v yq >/dev/null 2>&1; then
        printf '{"enabled_extensions":[],"requested_security":""}'
        exit 0
      fi
      yq -o=json '{
        "enabled_extensions": (.enabled_extensions // []),
        "requested_security": (.requested_security // "")
      }' "$PROFILE"

  - id: select-extensions
    type: switch
    expression: "{{ inputs.extensions }}"
    cases:
      recommended:
        - id: ext-recommended
          type: shell
          run: |
            PROFILE=".specify/spex-profile.yml"
            RECOMMENDED_EXTENSIONS="spex-gates spex-deep-review spex-worktrees"
            OPTIONAL_EXTENSIONS="spex-teams spex-collab spex-detach"
            MANAGED_EXTENSIONS="$RECOMMENDED_EXTENSIONS $OPTIONAL_EXTENSIONS"
            GATES_DEPENDENTS="spex-deep-review spex-teams spex-collab"
            ENABLED_LIST="$RECOMMENDED_EXTENSIONS"

            # On refresh, preserve the prior valid selection by default.
            if [ -f "$PROFILE" ] && command -v yq >/dev/null 2>&1; then
              SAVED_EXTENSIONS=$(yq -r '.enabled_extensions // [] | join(" ")' "$PROFILE" 2>/dev/null || true)
              if [ -n "$SAVED_EXTENSIONS" ]; then
                ENABLED_LIST="$SAVED_EXTENSIONS"
              fi
            fi

            # Preserve a valid dependency closure even if an older profile was
            # written before dependency validation was introduced.
            gates_needed=false
            for dependent in $GATES_DEPENDENTS; do
              for enabled in $ENABLED_LIST; do
                if [ "$dependent" = "$enabled" ]; then gates_needed=true; break; fi
              done
            done
            if [ "$gates_needed" = true ]; then
              gates_present=false
              for enabled in $ENABLED_LIST; do
                if [ "$enabled" = "spex-gates" ]; then gates_present=true; break; fi
              done
              if [ "$gates_present" = false ]; then
                ENABLED_LIST="spex-gates $ENABLED_LIST"
              fi
            fi

            # Recommended extensions are gates, deep review, and worktrees.
            # Teams (experimental), collaboration, and detach require opt-in.
            for ext in $MANAGED_EXTENSIONS; do
              selected=false
              for enabled in $ENABLED_LIST; do
                if [ "$ext" = "$enabled" ]; then selected=true; break; fi
              done
              if [ "$selected" = false ]; then
                specify extension disable "$ext" 2>/dev/null || true
              fi
            done
            printf "spex %s" "$ENABLED_LIST" > .specify/.spex-extension-selection
            cat .specify/.spex-extension-selection
      all:
        - id: ext-all-noop
          type: shell
          run: |
            printf "spex spex-gates spex-worktrees spex-deep-review spex-teams spex-collab spex-detach" > .specify/.spex-extension-selection
            cat .specify/.spex-extension-selection
      interactive:
        - id: ext-interactive-prompt
          type: prompt
          prompt: >-
            The following optional spex extensions are available. Reply with a
            comma-separated list of the extensions you want to KEEP enabled.
            Extensions not listed will be disabled.

            - spex-gates: Quality gates (spec, plan, code review)
            - spex-worktrees: Git worktree isolation for feature branches
            - spex-deep-review: Multi-perspective code review with 5 agents
            - spex-teams: Experimental parallel implementation via agent teams (explicit opt-in)
            - spex-collab: Collaborative PR workflows (reviewers, phases, triage)
            - spex-detach: Strip spec artifacts for upstream PRs

            Reply with extension names separated by commas (e.g. "spex-gates,spex-worktrees"),
            or "all" to keep everything enabled.
          integration: "{{ steps.detect-agent.output.stdout }}"
        - id: ext-interactive-fallback
          type: shell
          run: |
            # spex-teams is experimental and remains an explicit opt-in.
            RESPONSE="{{ steps.ext-interactive-prompt.output.stdout | default('') }}"
            if [ -z "$RESPONSE" ]; then
              RESPONSE="spex-gates,spex-deep-review,spex-worktrees"
              echo "No selection received; keeping recommended extensions." >&2
            elif [ "$RESPONSE" = "all" ]; then
              echo "All extensions enabled." >&2
              printf "spex spex-gates spex-worktrees spex-deep-review spex-teams spex-collab spex-detach" > .specify/.spex-extension-selection
              cat .specify/.spex-extension-selection
              exit 0
            fi
            OPTIONAL_EXTS="spex-gates spex-worktrees spex-deep-review spex-teams spex-collab spex-detach"
            GATES_DEPENDENTS="spex-teams spex-deep-review spex-collab"
            ENABLED_LIST=$(echo "$RESPONSE" | tr ',' ' ' | tr -d '"')
            # Enforce gates dependency
            gates_needed=false
            for dep in $GATES_DEPENDENTS; do
              for sel in $ENABLED_LIST; do
                [ "$dep" = "$sel" ] && gates_needed=true
              done
            done
            if [ "$gates_needed" = true ]; then
              gates_in_list=false
              for sel in $ENABLED_LIST; do
                [ "$sel" = "spex-gates" ] && gates_in_list=true
              done
              if [ "$gates_in_list" = false ]; then
                echo "Auto-enabling spex-gates (required by selected extensions)" >&2
                ENABLED_LIST="spex-gates $ENABLED_LIST"
              fi
            fi
            for ext in $OPTIONAL_EXTS; do
              found=false
              for sel in $ENABLED_LIST; do
                if [ "$ext" = "$sel" ]; then found=true; break; fi
              done
              if [ "$found" = false ]; then
                specify extension disable "$ext" 2>/dev/null || true
              fi
            done
            echo "Extension selection applied." >&2
            printf "spex %s" "$ENABLED_LIST" > .specify/.spex-extension-selection
            cat .specify/.spex-extension-selection
    default:
      - id: ext-filter
        type: shell
        run: |
          SELECTION="{{ inputs.extensions }}"
          OPTIONAL_EXTS="spex-gates spex-worktrees spex-deep-review spex-teams spex-collab spex-detach"
          GATES_DEPENDENTS="spex-teams spex-deep-review spex-collab"
          ENABLED_LIST=$(echo "$SELECTION" | tr ',' ' ')

          # Enforce dependencies: if any gates-dependent is selected, auto-enable spex-gates
          gates_needed=false
          for dep in $GATES_DEPENDENTS; do
            for sel in $ENABLED_LIST; do
              if [ "$dep" = "$sel" ]; then
                gates_needed=true
                break
              fi
            done
          done
          if [ "$gates_needed" = true ]; then
            gates_in_list=false
            for sel in $ENABLED_LIST; do
              [ "$sel" = "spex-gates" ] && gates_in_list=true
            done
            if [ "$gates_in_list" = false ]; then
              echo "Auto-enabling spex-gates (required by selected extensions)" >&2
              ENABLED_LIST="spex-gates $ENABLED_LIST"
            fi
          fi

          # Disable extensions not in the selection
          for ext in $OPTIONAL_EXTS; do
            found=false
            for sel in $ENABLED_LIST; do
              if [ "$ext" = "$sel" ]; then
                found=true
                break
              fi
            done
            if [ "$found" = false ]; then
              specify extension disable "$ext" 2>/dev/null || true
              echo "Disabled: $ext" >&2
            fi
          done
          printf "spex %s" "$ENABLED_LIST" > .specify/.spex-extension-selection
          cat .specify/.spex-extension-selection

  - id: adapt-commands
    type: shell
    run: |
      SOURCE="${SPEX_SOURCE:-$SPECKIT_WORKFLOW_DIR}"
      AGENT="{{ steps.detect-agent.output.stdout }}"
      ADAPT_SCRIPT="$SOURCE/scripts/spex-adapt-commands.sh"
      ADAPTERS_DIR="$SOURCE/scripts/adapters"
      COMMANDS_DIR=".specify/extensions"
      if [ ! -x "$ADAPT_SCRIPT" ]; then
        echo "Adaptation script not found, skipping command adaptation" >&2
        printf "skipped"
        exit 0
      fi
      if [ ! -d "$ADAPTERS_DIR/$AGENT" ]; then
        echo "No mapping table for $AGENT, commands remain neutral" >&2
        printf "neutral"
        exit 0
      fi
      "$ADAPT_SCRIPT" "$AGENT" "$COMMANDS_DIR" "$ADAPTERS_DIR" && printf "adapted"

  - id: adapt-harness
    type: switch
    expression: "{{ steps.detect-agent.output.stdout }}"
    cases:
      claude:
        - id: claude-statusline
          type: shell
          run: |
            SOURCE="${SPEX_SOURCE:-$SPECKIT_WORKFLOW_DIR}"
            STATUSLINE_SCRIPT="$SOURCE/scripts/spex-ship-statusline.sh"
            [ -f "$STATUSLINE_SCRIPT" ] || exit 0
            chmod +x "$STATUSLINE_SCRIPT" 2>/dev/null || true
            ABS_SCRIPT="$(cd "$(dirname "$STATUSLINE_SCRIPT")" && pwd)/$(basename "$STATUSLINE_SCRIPT")"
            SETTINGS=".claude/settings.local.json"
            CHAIN_FILE=".claude/.spex-previous-statusline"
            mkdir -p .claude
            if [ -f "$SETTINGS" ]; then
              if command -v jq >/dev/null 2>&1 && jq -e '.statusLine' "$SETTINGS" >/dev/null 2>&1; then
                CURRENT_CMD="$(jq -r '.statusLine.command // empty' "$SETTINGS")"
                if [ -n "$CURRENT_CMD" ] && [ -f "$CURRENT_CMD" ]; then
                  case "$CURRENT_CMD" in
                    *spex-ship-statusline.sh) exit 0 ;;
                  esac
                  echo "$CURRENT_CMD" > "$CHAIN_FILE"
                fi
              fi
              TMP=$(mktemp)
              jq --arg cmd "$ABS_SCRIPT" '.statusLine = {"type": "command", "command": $cmd}' "$SETTINGS" > "$TMP"
              mv "$TMP" "$SETTINGS"
            else
              jq -n --arg cmd "$ABS_SCRIPT" '{statusLine: {type: "command", command: $cmd}}' > "$SETTINGS"
            fi
            echo "Status line configured" >&2
      codex:
        - id: codex-hooks
          type: shell
          run: |
            SOURCE="${SPEX_SOURCE:-$SPECKIT_WORKFLOW_DIR}"
            mkdir -p .codex
            CODEX_PRETOOL="$(cd "$SOURCE/scripts/adapters/codex" 2>/dev/null && pwd)/pretool-gate.py"
            CODEX_CONTEXT="$(cd "$SOURCE/scripts/adapters/codex" 2>/dev/null && pwd)/context-hook.py"
            PYTHON_RESOLVE="$(cd "$SOURCE/scripts/hooks" 2>/dev/null && pwd)/python-resolve.sh"
            if [ ! -f "$CODEX_PRETOOL" ] || [ ! -f "$CODEX_CONTEXT" ]; then
              echo "WARNING: Codex adapter scripts not found" >&2
              exit 0
            fi
            CTX_CMD="sh $PYTHON_RESOLVE $CODEX_CONTEXT"
            PRE_CMD="sh $PYTHON_RESOLVE $CODEX_PRETOOL"
            if [ -f .codex/hooks.json ]; then
              TMP=$(mktemp)
              jq --arg ctx "$CTX_CMD" --arg pre "$PRE_CMD" '
                .hooks.UserPromptSubmit = [(.hooks.UserPromptSubmit // [] | .[] | select(
                  .hooks[0].command | test("context-hook\\.py") | not
                ))] + [{hooks: [{command: $ctx, type: "command"}]}] |
                .hooks.PreToolUse = [(.hooks.PreToolUse // [] | .[] | select(
                  .hooks[0].command | test("pretool-gate\\.py") | not
                ))] + [{hooks: [{command: $pre, type: "command"}]}]
              ' .codex/hooks.json > "$TMP"
              mv "$TMP" .codex/hooks.json
            else
              jq -n --arg ctx "$CTX_CMD" --arg pre "$PRE_CMD" '{
                hooks: {
                  UserPromptSubmit: [{hooks: [{command: $ctx, type: "command"}]}],
                  PreToolUse: [{hooks: [{command: $pre, type: "command"}]}]
                }
              }' > .codex/hooks.json
            fi
            echo "Codex adapter hooks installed" >&2
      opencode:
        - id: opencode-plugin
          type: shell
          run: |
            SOURCE="${SPEX_SOURCE:-$SPECKIT_WORKFLOW_DIR}"
            mkdir -p .opencode/plugins
            PLUGIN="$SOURCE/scripts/adapters/opencode/spex-plugin.ts"
            if [ -f "$PLUGIN" ]; then
              cp "$PLUGIN" .opencode/plugins/spex-plugin.ts
              echo "OpenCode plugin installed" >&2
            fi
        - id: opencode-agents-md
          type: shell
          run: |
            SOURCE="${SPEX_SOURCE:-$SPECKIT_WORKFLOW_DIR}"
            TEMPLATE="$SOURCE/templates/agents-md/opencode.md"
            if [ -f "$TEMPLATE" ]; then
              cp "$TEMPLATE" AGENTS.md
              echo "AGENTS.md generated for OpenCode" >&2
            fi
    default:
      - id: default-harness
        type: shell
        run: |
          echo "No agent-specific configuration applied." >&2
          echo "Extensions installed with neutral defaults." >&2
          echo "Use 'specify extension list' to see available extensions." >&2

  - id: configure-security
    type: switch
    expression: "{{ steps.detect-agent.output.stdout }}"
    cases:
      codex:
        - id: codex-security
          type: shell
          run: |
            SOURCE="${SPEX_SOURCE:-$SPECKIT_WORKFLOW_DIR}"
            ROOT=$(pwd -P)
            REQUESTED="{{ steps.validate-security.output.stdout }}"
            CONFIRMATION="{{ inputs.fallback_confirmation }}"
            CONFIGURATOR="$SOURCE/scripts/adapters/codex/configure-project.py"
            [ -f "$CONFIGURATOR" ] || { echo "ERROR: Codex configurator is unavailable" >&2; exit 1; }

            # A persisted safer fallback was already explicitly accepted.
            if [ "$CONFIRMATION" != "accept" ] && [ -f .specify/spex-profile.yml ]; then
              SAVED=$(python3 -c 'import json; print(json.load(open(".specify/spex-profile.yml")).get("effective_security", ""))' 2>/dev/null || true)
              SAVED_REQUESTED=$(python3 -c 'import json; print(json.load(open(".specify/spex-profile.yml")).get("requested_security", ""))' 2>/dev/null || true)
              if [ "$SAVED_REQUESTED" = "$REQUESTED" ] && [ -n "$SAVED" ] && [ "$SAVED" != "$REQUESTED" ]; then
                CONFIRMATION="accept"
              fi
            fi

            CONFIRM_ARGS=""
            [ "$CONFIRMATION" != "accept" ] || CONFIRM_ARGS="--confirm-fallback safe"
            set +e
            RESULT=$(python3 "$CONFIGURATOR" configure --root "$ROOT" --security "$REQUESTED" $CONFIRM_ARGS)
            STATUS=$?
            set -e
            if [ "$STATUS" -eq 3 ]; then
              echo "A safer security fallback requires explicit confirmation:" >&2
              echo "$RESULT" | jq -r '"  requested: \(.requested_security)\n  proposed: \(.proposed_security)\n  reason: \(.reason)"' >&2
              echo "Re-run with fallback_confirmation=accept, or decline to leave configuration unchanged." >&2
              rm -f .specify/.spex-extension-selection .specify/.spex-security-result.json
              exit 1
            fi
            [ "$STATUS" -eq 0 ] || { rm -f .specify/.spex-extension-selection; echo "$RESULT" >&2; exit "$STATUS"; }
            printf "%s" "$RESULT" > .specify/.spex-security-result.json
            cat .specify/.spex-security-result.json
      claude:
        - id: claude-security
          type: shell
          run: |
            REQUESTED="{{ steps.validate-security.output.stdout }}"
            jq -cn --arg security "$REQUESTED" '{
              status: "configured",
              requested_security: $security,
              effective_security: $security,
              config_changed: false,
              capabilities: {permissions: {status: "native"}}
            }' > .specify/.spex-security-result.json
            cat .specify/.spex-security-result.json
      opencode:
        - id: opencode-security
          type: shell
          run: |
            REQUESTED="{{ steps.validate-security.output.stdout }}"
            if [ "$REQUESTED" != "safe" ] && [ "{{ inputs.fallback_confirmation }}" != "accept" ]; then
              echo "OpenCode currently supports only the Safe profile; explicit fallback confirmation is required." >&2
              rm -f .specify/.spex-extension-selection
              exit 1
            fi
            jq -cn --arg requested "$REQUESTED" '{
              status: "configured",
              requested_security: $requested,
              effective_security: "safe",
              config_changed: false,
              reason: (if $requested == "safe" then null else "OpenCode permission mapping is unavailable" end),
              capabilities: {permissions: {status: "degraded", reason: "Project policy is retained", fallback: "safe"}}
            }' > .specify/.spex-security-result.json
            cat .specify/.spex-security-result.json
    default:
      - id: neutral-security
        type: shell
        run: |
          REQUESTED="{{ steps.validate-security.output.stdout }}"
          jq -cn --arg security "$REQUESTED" '{
            status: "configured",
            requested_security: $security,
            effective_security: $security,
            config_changed: false,
            capabilities: {}
          }' > .specify/.spex-security-result.json
          cat .specify/.spex-security-result.json

  - id: persist-initialization-profile
    type: shell
    run: |
      SOURCE="${SPEX_SOURCE:-$SPECKIT_WORKFLOW_DIR}"
      ROOT=$(pwd -P)
      trap 'rm -f .specify/.spex-security-result.json .specify/.spex-extension-selection' EXIT
      PROFILE_TOOL="$SOURCE/scripts/spex-init-profile.py"
      HARNESS="{{ steps.detect-agent.output.stdout }}"
      REQUESTED="{{ steps.validate-security.output.stdout }}"
      SECURITY_RESULT=$(cat .specify/.spex-security-result.json)
      EFFECTIVE=$(printf "%s" "$SECURITY_RESULT" | jq -r '.effective_security')
      CAPABILITIES=$(printf "%s" "$SECURITY_RESULT" | jq -c '.capabilities // {}')
      EXTENSIONS=$(cat .specify/.spex-extension-selection)
      EXPECTED=0
      if [ -f .specify/spex-profile.yml ]; then
        EXPECTED=$(python3 "$PROFILE_TOOL" load --root "$ROOT" | jq -r '.config_revision')
      fi

      set --
      for extension in $EXTENSIONS; do
        set -- "$@" --extension "$extension"
      done
      PROPOSAL=$(python3 "$PROFILE_TOOL" propose --root "$ROOT" --harness "$HARNESS" \
        "$@" --requested-security "$REQUESTED" --effective-security "$EFFECTIVE" \
        --capabilities-json "$CAPABILITIES") || exit 1
      printf "%s" "$PROPOSAL" | python3 "$PROFILE_TOOL" validate --root "$ROOT" >/dev/null || exit 1

      FALLBACK="decline"
      [ "$REQUESTED" = "$EFFECTIVE" ] || FALLBACK="accept"
      printf "%s" "$PROPOSAL" | python3 "$PROFILE_TOOL" persist --root "$ROOT" \
        --expected-revision "$EXPECTED" --fallback-confirmation "$FALLBACK"

  - id: setup-summary
    type: shell
    run: |
      PROFILE=.specify/spex-profile.yml
      python3 - "$PROFILE" <<'PY'
      import json, sys
      profile = json.load(open(sys.argv[1]))
      print("Spex initialization complete")
      print("  harness:", profile["active_harness"])
      print("  extensions:", ", ".join(profile["enabled_extensions"]))
      print("  requested security:", profile["requested_security"])
      print("  effective security:", profile["effective_security"])
      if profile["requested_security"] != profile["effective_security"]:
          print("  safer fallback: confirmed")
      print("  profile revision:", profile["config_revision"])
      PY

  - id: configure-gitignore
    type: shell
    run: |
      GITIGNORE=".gitignore"
      SENTINEL="# spex: generated/local files"
      if [ -f "$GITIGNORE" ]; then
        if grep -qF ".claude/commands/speckit." "$GITIGNORE" 2>/dev/null; then
          sed -i.bak 's|\.claude/commands/speckit\.\*|.claude/skills/|' "$GITIGNORE" && rm -f "$GITIGNORE.bak"
        elif grep -qF ".claude/skills/speckit-*" "$GITIGNORE" 2>/dev/null; then
          sed -i.bak 's|\.claude/skills/speckit-\*|.claude/skills/|' "$GITIGNORE" && rm -f "$GITIGNORE.bak"
        fi
        if grep -qF ".specify/.spex-phase" "$GITIGNORE" 2>/dev/null; then
          sed -i.bak '/.specify\/.spex-phase/d;/.specify\/.spex-state/d;/.claude\/skills\//d;/.claude\/settings\.local\.json/d' "$GITIGNORE" && rm -f "$GITIGNORE.bak"
        fi
      fi
      [ -f "$GITIGNORE" ] && grep -qF "$SENTINEL" "$GITIGNORE" 2>/dev/null && exit 0
      cat >> "$GITIGNORE" << 'GIEOF'

      # spex: generated/local files (only constitution is committed)
      **/.claude/
      **/.specify/**
      !**/.specify/memory/
      !**/.specify/memory/constitution.md
      GIEOF
      echo "Updated .gitignore with spex patterns" >&2

  - id: fix-constitution
    type: shell
    run: |
      if [ -L ".specify/memory/constitution.md" ]; then
        if [ -f ".specify/memory/constitution.md" ]; then
          cat ".specify/memory/constitution.md" > ".specify/memory/constitution.md.tmp"
          rm ".specify/memory/constitution.md"
          mv ".specify/memory/constitution.md.tmp" ".specify/memory/constitution.md"
        fi
        [ -f "specs/constitution.md" ] && [ ! -L "specs/constitution.md" ] && rm "specs/constitution.md" || true
      elif [ -f "specs/constitution.md" ] && [ ! -e ".specify/memory/constitution.md" ]; then
        mkdir -p .specify/memory
        mv specs/constitution.md .specify/memory/constitution.md
      elif [ -f "specs/constitution.md" ] && [ -f ".specify/memory/constitution.md" ] && [ ! -L ".specify/memory/constitution.md" ]; then
        rm "specs/constitution.md"
      fi
      printf "ok"

  - id: check-update
    type: shell
    run: |
      command -v curl >/dev/null 2>&1 || exit 0
      command -v jq >/dev/null 2>&1 || exit 0
      RESPONSE=$(curl -sf --connect-timeout 2 --max-time 3 \
        "https://api.github.com/repos/rhuss/cc-spex/releases/latest" 2>/dev/null) || exit 0
      LATEST_TAG=$(echo "$RESPONSE" | jq -r '.tag_name // empty' 2>/dev/null)
      [ -n "$LATEST_TAG" ] || exit 0
      LATEST="${LATEST_TAG#v}"
      echo "Latest spex release: $LATEST" >&2
      printf "%s" "$LATEST"
