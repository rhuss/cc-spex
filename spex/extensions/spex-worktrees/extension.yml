schema_version: "1.0"

extension:
  id: spex-worktrees
  name: "Spex Worktrees"
  version: "1.0.0"
  description: "Git worktree isolation for feature development"
  author: cc-spex
  license: MIT

requires:
  speckit_version: ">=0.5.2"
  tools:
    - name: git
      required: true

provides:
  commands:
    - name: speckit.spex-worktrees.manage
      file: commands/speckit.spex-worktrees.manage.md
      description: "Manage git worktrees for isolated feature development"

hooks:
  after_specify:
    command: speckit.spex-worktrees.manage
    optional: true
    prompt: "Create a worktree for this feature?"
    description: "Create git worktree after specification"

tags:
  - "spex"
  - "git"
  - "worktree"
