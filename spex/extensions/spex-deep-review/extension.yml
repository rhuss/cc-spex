schema_version: "1.0"

extension:
  id: spex-deep-review
  name: "Spex Deep Review"
  version: "1.0.0"
  description: "Multi-perspective code review with 5 specialized agents and autonomous fix loop"
  author: cc-spex
  license: MIT

requires:
  speckit_version: ">=0.5.2"
  extensions:
    - id: spex-gates
      version: ">=1.0.0"

provides:
  commands:
    - name: speckit.spex-deep-review.run
      file: commands/speckit.spex-deep-review.run.md
      description: "Multi-perspective code review with autonomous fix loop"

  config:
    - name: "deep-review-config.yml"
      template: "config-template.yml"
      description: "Deep review extension configuration"
      required: false

hooks:
  after_implement:
    command: speckit.spex-deep-review.run
    optional: true
    prompt: "Run deep multi-perspective review?"
    description: "Multi-agent code review after implementation"

tags:
  - "spex"
  - "review"
  - "agents"
