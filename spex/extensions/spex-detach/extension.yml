schema_version: "1.0"

extension:
  id: spex-detach
  name: "Spex Detach"
  version: "2.0.0"
  description: "Stealth mode for upstream contributions: hide spec artifacts via .git/info/exclude, archive to sibling repo at finish time"
  author: cc-spex
  license: MIT

requires:
  speckit_version: ">=0.5.2"
  tools:
    - name: git
      required: true
    - name: jq
      required: true
    - name: yq
      required: false

provides:
  commands:
    - name: speckit.spex-detach.detach
      file: commands/speckit.spex-detach.detach.md
      description: "Enable stealth mode (exclude spec files from git) or archive specs to sibling repo"

  config:
    - name: "spex-detach-config.yml"
      template: "config-template.yml"
      description: "Detach extension configuration (exclude paths, archive path)"
      required: false

hooks:
  after_init:
    command: speckit.spex-detach.detach
    args: "enable"
    optional: false
    prompt: "Set up .git/info/exclude entries for stealth mode?"
    description: "Write exclude entries to hide spec artifacts from git"

  before_finish:
    command: speckit.spex-detach.detach
    args: "archive"
    optional: true
    prompt: "Archive specs to project-specs repo before finishing?"
    description: "Copy spec artifacts to configured archive path"

tags:
  - "spex"
  - "upstream"
  - "contribution"
  - "stealth"
  - "detach"
