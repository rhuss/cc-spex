# Hook Registration Contract
# Extensions register hooks in their extension.yml manifest.
# Spec-kit aggregates all hooks into .specify/extensions.yml at install time.

# Per-extension manifest format (in extension.yml):
hooks:
  after_specify:                      # Event name (before_*/after_*)
    command: "speckit.spex-gates.review-spec"  # Must be a provided command
    optional: false                   # false = mandatory, true = user can skip
    prompt: null                      # Prompt text for optional hooks
    description: "Run spec review"    # Human-readable description

# Aggregated format (in .specify/extensions.yml):
# Generated by `specify extension add/remove/enable/disable`
installed: []
settings:
  auto_execute_hooks: true
hooks:
  after_specify:
    - extension: "spex-gates"
      command: "speckit.spex-gates.review-spec"
      enabled: true                   # Matches extension enabled state
      optional: false
      prompt: null
      description: "Run spec review after specification"
      condition: null
    - extension: "spex-worktrees"
      command: "speckit.spex-worktrees.worktree"
      enabled: true
      optional: true
      prompt: "Create a worktree for this feature?"
      description: "Create git worktree after specification"
      condition: null

# Execution rules:
# 1. Multiple hooks on same event execute sequentially in listed order
# 2. Disabled hooks (enabled: false) are skipped
# 3. Optional hooks prompt the user before execution
# 4. Mandatory hooks (optional: false) execute automatically
# 5. When a mandatory hook fails, the pipeline halts (FR-013)

# Available events (before/after variants):
# constitution, specify, clarify, plan, tasks, implement,
# checklist, analyze, taskstoissues
